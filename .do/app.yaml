name: anger-practice
region: nyc
services:
  - name: web
    github:
      repo: peacefulgeek/anger-practice
      branch: main
      deploy_on_push: true
    build_command: pnpm install --frozen-lockfile=false && pnpm build
    run_command: node dist/index.js
    http_port: 3000
    instance_size_slug: basic-xs
    instance_count: 1
    health_check:
      http_path: /health
      initial_delay_seconds: 20
      period_seconds: 30
      timeout_seconds: 10
    envs:
      - key: NODE_ENV
        value: production
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-pro
      - key: BUNNY_PULL_ZONE
        value: anger-practice.b-cdn.net
      - key: BUNNY_STORAGE_ZONE
        value: anger-practice
      - key: BUNNY_STORAGE_REGION
        value: ny
      - key: BUNNY_STORAGE_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
domains:
  - domain: theangerpractice.com
    type: PRIMARY
  - domain: www.theangerpractice.com
    type: ALIAS
